name: isc_ccn
description: "Avisos ISC - App móvil para estudiantes del ISC CCN"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.8.0

  # Almacenamiento seguro del JWT
  flutter_secure_storage: ^9.2.4

  # Base de datos local (modo offline / sync)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Firebase (notificaciones push FCM)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5

  # Gestión de estado
  flutter_riverpod: ^2.6.1

  # Imágenes con caché
  cached_network_image: ^3.4.1

  # Formateo de fechas
  intl: ^0.20.2

  # Navegación declarativa
  go_router: ^15.1.2

  # Abrir links externos
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/icon.png
  adaptive_icon_background: "#0B1B3A"
  adaptive_icon_foreground: assets/images/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
